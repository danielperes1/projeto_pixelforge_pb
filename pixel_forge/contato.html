<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelForge Studios - Contato</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- CSS INTERNO -->
    <style>
      .topo {
        background-color: lightblue;
      }
    </style>

    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="topo">
      <nav class="navegacao container">
        <div class="logo">
          <i class="fa-solid fa-gamepad"></i>
          PixelForge Studios
          <br />
          <!-- CSS INLINE -->
          <h5 style="font-size: 15px">
            Desafiando limites, um pixel de cada vez
          </h5>
        </div>

        <ul class="menu">
          <li>
            <a href="./index.html">
              <i class="fa-solid fa-house"></i>
              Home
            </a>
          </li>

          <li>
            <a href="./pagina2.html">
              <i class="fa-solid fa-gamepad"></i>
              Jogos Produzidos
            </a>
          </li>

          <li>
            <a href="./pagina3.html">
              <i class="fa-solid fa-image"></i>
              Portfólio
            </a>
          </li>

          <li>
            <a href="./contato.html">
              <i class="fa-solid fa-phone"></i>
              Contato
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <h2 style="margin-left: 20px; margin-top: 30px; font-size: 37px">
        Fale Conosco
      </h2>

      <form class="form-contato">
        <label for=""> <strong>Nome:</strong></label>
        <input
          type="name"
          style="text-align: left"
          placeholder="Seu nome completo"
          class="campo-assunto"
        />
        <label for=""> <strong>Email:</strong></label>
        <input
          type="email"
          style="text-align: left"
          placeholder="seuemail@gmail.com"
          class="campo-assunto"
        />
        <label for=""><strong>Assunto:</strong></label>
        <input
          type="assunto"
          style="text-align: left"
          placeholder="Ex: Jogos, Desenvolvimento, Competir"
          class="campo-assunto"
        />
        <label for=""><strong>Mensagem:</strong></label>
        <input
          type="Mensagem"
          placeholder="Escreva sua mensagem aqui"
          id="caixamaior"
          class="campo-assunto"
        />

        <button type="submit" class="botao-enviar">Enviar</button>
      </form>
    </main>

    <footer class="rodape">
      <h4>
        <i class="fa-solid fa-circle-info"></i> Informações sobre a startup:
      </h4>
      <h5>
        <i class="fa-solid fa-envelope"></i> Email:
        pixelforgestudios@outlook.com
      </h5>
      <h5><i class="fa-solid fa-phone"></i> Telefone: 21 999452532</h5>
      <h5><i class="fa-solid fa-calendar-days"></i> Ano: 2026</h5>
    </footer>
  </body>
</html>
